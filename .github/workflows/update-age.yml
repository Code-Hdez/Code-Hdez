name: Update Age in README

on:
  schedule:
    - cron: '0 0 2 7 *'
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  update-age:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Calculate and update age
        run: |
          python3 - <<'EOF'
          from datetime import date
          import re

          BIRTH_DATE = date(2003, 7, 2)  # July 2, 2003

          today = date.today()
          age = today.year - BIRTH_DATE.year - (
              (today.month, today.day) < (BIRTH_DATE.month, BIRTH_DATE.day)
          )

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          updated = re.sub(
              r'<!-- BIRTHDAY_AGE -->\d+<!-- /BIRTHDAY_AGE -->',
              f'<!-- BIRTHDAY_AGE -->{age}<!-- /BIRTHDAY_AGE -->',
              content
          )

          if updated != content:
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(updated)
              print(f"Age updated to {age}")
          else:
              print("Age unchanged, skipping commit.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update age"
          git push
